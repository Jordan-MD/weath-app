<!doctype html>

<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./src/css/style.css" />

    <script src="./src/js/main.js" type="module" defer></script>

    <title>Weather App MD</title>
  </head>

  <body class="h-full grid place-items-center bg-sky-100">
    <main class="bg-[url('/src/asset/images/vitre_humide.jpg')] bg-cover bg-center h-screen w-full grid place-items-center">
      <div
        class="weather-app max-w-md mx-auto bg-sky-50/80 rounded-2xl shadow-2xl p-6 space-y-6"
      >
        <header
          class="weather-header text-3xl font-bold text-blue-950 text-center"
        >
          Weather app MD
        </header>

        <form
          class="searchForm flex justify-center gap-2"
          action="#"
          method="GET"
        >
          <input
            type="text"
            class="searchInput w-full focus:bg-white border border-sky-100 focus:border-sky-300 placeholder:text-gray-300 transition-all shadow-inner rounded-2xl"
            id="city-input"
            name="city"
            placeholder=" Rechercher une ville..."
            required
          />

          <button
            type="submit"
            class="bg-gray-400 rounded-full p-1 hover:bg-amber-200 transition-all shadow-md"
            id="searchButton"
          >
            Go
          </button>
        </form>

        <p
          class="loading text-center text-sm text-sky-600 animate-pulse"
          hidden
        >
          Chargement...
        </p>

        <p
          class="error-message"
          role="alert text-center text-sm text-red-500 bg-red-50 p-3 rounded-xl border border-red-100"
          hidden
        ></p>

        <section
          class="weather-current flex flex-col justify-around items-center gap-4"
        >
          <article class="weather-card w-full bg-sky-10 rounded-xl p-4 text-center flex flex-col items-center justify-center gap-2 shadow-md">
            <h2 class="weather-location text-2xl font-bold text-gray-500">
              Yaoundé, CM
            </h2>
            <img class="weather-icon "></img>
            <p class="weather-desc">Ensoleillé</p>
            <span class="weather-temp">27°C</span>
          </article>

          <ul class="weather-details bg-gray-200/50 rounded-xl grid grid-cols-3 gap-2 p-1 shadow-blue-500/20 shadow-lg">
            <li class="weather-details-item border-3 border-gray-300 rounded-xl p-4 place-items-center text-center">
              <div class="characteristic">
                <span class="weather-details-icon" aria-hidden="true">💧</span>

                <span class="weather-details-label">Humidité</span>
              </div>

              <span class="weather-details-humidity">30%</span>
            </li>

            <li class="weather-details-item border-3 border-gray-300 rounded-xl p-4 place-items-center text-center">

              <div class="characteristic">
                <span class="weather-details-icon" aria-hidden="true">👁</span>

                <span class="weather-details-label">Visibilité</span>
              </div>

              <span class="weather-details-visibility">10 Km</span>
            </li>

            <li class="weather-details-item border-3 border-gray-300 rounded-xl p-4 place-items-center text-center">

              <div class="characteristic">
                <span class="weather-details-icon" aria-hidden="true">🌬</span>

                <span class="weather-details-label">Vent</span>
              </div>

              <span class="weather-details-wind">12 Km/h</span>
            </li>
          </ul>
        </section>

        <section class="weather-forecast">
          <ul class="weather-forecast-list w-full grid grid-cols-5 gap-4"></ul>
        </section>
      </div>
    </main>
  </body>
</html>
