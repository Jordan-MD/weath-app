<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />

    <script src="./js/main.js" type="module" defer></script>

    <title>Weather App MD</title>
  </head>
  <body>
    <main>
      <div class="weather-app">
        <header>
          <h1>Weather app MD</h1>
        </header>

        <form class="searchForm" action="#" method="GET">
          <input
            type="text"
            id="city-input"
            name="city"
            placeholder="Rechercher une ville..."
            required
          />
          <button type="submit" id="searchButton">Search</button>
        </form>

        <p class="loading" hidden>Chargement...</p>

        <p class="error-message" role="alert" hidden></p>

        <section class="weather-current">
          <article class="weather-container">
            <div class="weather-card">
              <h2 class="weather-location">📍 Yaoundé</h2>
              <span class="weather-icon" aria-hidden="true">☀️</span>
              <span class="weather-temp">27°C</span>
              <p class="weather-desc">Ensoleillé</p>
            </div>

            <ul class="weather-details">
              <li class="weather-details-item">
                <div class="weather-details-caract">
                  <span class="weather-details-icon" aria-hidden="true"
                    >💧</span
                  >
                  <span class="weather-details-label">Humidité</span>
                </div>
                <span class="weather-details-humidity">30%</span>
              </li>
              <li class="weather-details-item">
                <div class="weather-details-caract">
                  <span class="weather-details-icon" aria-hidden="true"
                    >👁</span
                  >
                  <span class="weather-details-label">Visibilité</span>
                </div>
                <span class="weather-details-visibility">10 Km</span>
              </li>
              <li class="weather-details-item">
                <div class="weather-details-caract">
                  <span class="weather-details-icon" aria-hidden="true"
                    >🌬</span
                  >
                  <span class="weather-details-label">Vent</span>
                </div>
                <span class="weather-details-wind">12 Km/h</span>
              </li>
            </ul>
          </article>
        </section>

        <section class="weather-forecast">
          <ul class="weather-forecast-list">
            <li class="weather-forecast-item">
              <time class="weather-forecast-day">Mar</time>
              <span class="weather-forecast-temp">26°</span>
              <span class="weather-forecast-icon" aria-hidden="true">🌧️</span>
            </li>
            <li class="weather-forecast-item">
              <time class="weather-forecast-day">Mer</time>
              <span class="weather-forecast-temp">27°</span>
              <span class="weather-forecast-icon" aria-hidden="true">☁️</span>
            </li>
            <li class="weather-forecast-item">
              <time class="weather-forecast-day">Jeu</time>
              <span class="weather-forecast-temp">28°</span>
              <span class="weather-forecast-icon" aria-hidden="true">☁️</span>
            </li>
            <li class="weather-forecast-item">
              <time class="weather-forecast-day">Ven</time>
              <span class="weather-forecast-temp">31°</span>
              <span class="weather-forecast-icon" aria-hidden="true">☀️</span>
            </li>
            <li class="weather-forecast-item">
              <time class="weather-forecast-day">Sam</time>
              <span class="weather-forecast-temp">26°</span>
              <span class="weather-forecast-icon" aria-hidden="true">🌧️</span>
            </li>
            <li class="weather-forecast-item">
              <time class="weather-forecast-day">Dim</time>
              <span class="weather-forecast-temp">29°</span>
              <span class="weather-forecast-icon" aria-hidden="true">☁️</span>
            </li>
            <li class="weather-forecast-item">
              <time class="weather-forecast-day">Lun</time>
              <span class="weather-forecast-temp">30°</span>
              <span class="weather-forecast-icon" aria-hidden="true">☀️</span>
            </li>
          </ul>
        </section>
      </div>
    </main>
  </body>
</html>
