<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />

    <script src="./js/main.js" defer></script>

    <title>Weather App MD</title>
  </head>
  <body>
    <main>
      <div class="weather-app">
        <header>
          <h1>Weather app MD</h1>
        </header>

        <form class="search-form" role="search" action="#" method="GET">
          <input
            type="text"
            id="city-input"
            name="city"
            placeholder="Rechercher une ville..."
            required
          />
          <button type="submit" id="searchButton">Search</button>
        </form>

        <section class="weather-current">
          <div class="weather-container">
            <div class="weather-card">
              <h2 class="weather-location">📍 Yaoundé</h2>
              <span class="weather-icon" aria-hidden="true">☀️</span>
              <span class="weather-temp">27°C</span>
              <p class="weather-desc">Ensoleillé</p>
            </div>

            <ul class="weather-details">
              <li class="weather-details-item">
                <div class="weather-details-caract">
                  <span class="weather-details-icon" aria-hidden="true"
                    >💧</span
                  >
                  <span class="weather-details-label">Humidité</span>
                </div>
                <div class="weather-details-value">30%</div>
              </li>
              <li class="weather-details-item">
                <div class="weather-details-caract">
                  <span class="weather-details-icon" aria-hidden="true"
                    >👁</span
                  >
                  <span class="weather-details-label">Visibilité</span>
                </div>
                <div class="weather-details-value">10 Km</div>
              </li>
              <li class="weather-details-item">
                <div class="weather-details-caract">
                  <span class="weather-details-icon" aria-hidden="true"
                    >🌬</span
                  >
                  <span class="weather-details-label">Vent</span>
                </div>
                <div class="weather-details-value">12 Km/h</div>
              </li>
            </ul>
          </div>
        </section>

        <section class="weather-forecast">
          <ul class="weather-forecast-list">
            <li class="weather-forecast-item">
              <div class="weather-forecast-day">Mar</div>
              <div class="weather-forecast-temp">26°</div>
              <div class="weather-forecast-icon" aria-hidden="true">🌧️</div>
            </li>
            <li class="weather-forecast-item">
              <div class="weather-forecast-day">Mer</div>
              <div class="weather-forecast-temp">27°</div>
              <div class="weather-forecast-icon" aria-hidden="true">☁️</div>
            </li>
            <li class="weather-forecast-item">
              <div class="weather-forecast-day">Jeu</div>
              <div class="weather-forecast-temp">28°</div>
              <div class="weather-forecast-icon" aria-hidden="true">☁️</div>
            </li>
            <li class="weather-forecast-item">
              <div class="weather-forecast-day">Ven</div>
              <div class="weather-forecast-temp">31°</div>
              <div class="weather-forecast-icon" aria-hidden="true">☀️</div>
            </li>
            <li class="weather-forecast-item">
              <div class="weather-forecast-day">Sam</div>
              <div class="weather-forecast-temp">26°</div>
              <div class="weather-forecast-icon" aria-hidden="true">🌧️</div>
            </li>
            <li class="weather-forecast-item">
              <div class="weather-forecast-day">Dim</div>
              <div class="weather-forecast-temp">29°</div>
              <div class="weather-forecast-icon" aria-hidden="true">☁️</div>
            </li>
            <li class="weather-forecast-item">
              <div class="weather-forecast-day">Lun</div>
              <div class="weather-forecast-temp">30°</div>
              <div class="weather-forecast-icon" aria-hidden="true">☀️</div>
            </li>
          </ul>
        </section>
      </div>
    </main>
  </body>
</html>
